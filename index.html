<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SmartHub Tools</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { font-size: 28px; margin: 0 0 8px; color: #fff; }
        .sub { font-size: 14px; color: #888; margin-bottom: 40px; }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .tool-card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 28px 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .tool-card:hover {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.06);
            transform: translateY(-2px);
        }
        .tool-card h2 {
            margin: 0 0 10px;
            font-size: 17px;
            color: #fff;
        }
        .tool-card p {
            margin: 0;
            font-size: 13px;
            color: #999;
            line-height: 1.5;
        }
        .tool-card .icon {
            font-size: 28px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <h1>SmartHub Tools</h1>
    <p class="sub">Productivity tools for SellerFlex operations</p>

    <div class="tools-grid">
        <a class="tool-card" href="removal-generator.html">
            <div class="icon">📦</div>
            <h2>SF Inventory Removal File Generator</h2>
            <p>Upload Inventory by Bin report and generate removal files. Auto-splits large files into chunks of 2999 rows.</p>
        </a>

        <!-- Add more tools here -->
        <!--
        <a class="tool-card" href="your-next-tool.html">
            <div class="icon">🔧</div>
            <h2>Next Tool Name</h2>
            <p>Description of what the tool does.</p>
        </a>
        -->
    </div>
</body>
</html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SellerFlex Inventory Removal File Generator</title><script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script><style>*{box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;margin:0;padding:40px;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}h1{font-size:22px;margin:0 0 8px;color:#fff}.sub{font-size:13px;color:#888;margin-bottom:32px}.drop{border:2px dashed #444;border-radius:12px;padding:60px 40px;text-align:center;cursor:pointer;transition:all .2s;width:100%;max-width:560px}.drop:hover,.drop.over{border-color:#6c63ff;background:rgba(108,99,255,.06)}.drop h2{margin:0 0 8px;font-size:18px;color:#ccc}.drop p{margin:0;color:#666;font-size:13px}.result{margin-top:24px;padding:20px;background:#16213e;border:1px solid #333;border-radius:10px;width:100%;max-width:560px;display:none}.result h3{margin:0 0 8px;font-size:15px;color:#4caf50}.result p{margin:4px 0;font-size:13px;color:#999}button{margin-top:14px;background:#6c63ff;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500}button:hover{background:#5a52d5}input[type=file]{display:none}</style></head><body><h1>SellerFlex Inventory Removal File Generator</h1><p class="sub">Upload Inventory by Bin report → Get SF Removal file</p><div class="drop" id="drop" onclick="document.getElementById('fi').click()"><h2>Drop Your Inventory File Here</h2><p>.csv / .xlsx / .xls</p></div><input type="file" id="fi" accept=".csv,.xlsx,.xls"><div class="result" id="result"><h3>✅ Removal file ready</h3><p id="info"></p><button id="dlBtn" onclick="saveFile()">Download</button></div><script>let outWB,outName='SF_Removal.xlsx';const drop=document.getElementById('drop'),fi=document.getElementById('fi'),res=document.getElementById('result'),info=document.getElementById('info');drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});drop.addEventListener('dragleave',()=>drop.classList.remove('over'));drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');process(e.dataTransfer.files[0])});fi.addEventListener('change',e=>{if(e.target.files[0])process(e.target.files[0])});function process(file){const code=file.name.split('-')[0]||'XXXX';outName=code+'_SF_Removal.xlsx';const reader=new FileReader();reader.onload=function(e){const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{defval:''});const header=['ASIN/SKU/FNSKU','EXPIRY_DATE (dd/mm/yyyy)','MANUFACTURING_DATE (dd/mm/yyyy)','ADJUSTMENT_TYPE','SOURCE_BIN_ID','DESTINATION_BIN_ID','SOURCE_INVENTORY_TYPE','DESTINATION_INVENTORY_TYPE','QUANTITY'];const rows=[header];let skipped=0;data.forEach(r=>{const sku=r['sku']||r['SKU']||r['Sku']||'';const bin=r['bin']||r['Bin']||r['BIN']||'';const sellable=parseInt(r['Sellable']||r['sellable']||r['SELLABLE']||0);if(!sellable||sellable<=0){skipped++;return;}rows.push([sku,'','','REMOVE',bin,'','PRIME','',sellable]);});const ows=XLSX.utils.aoa_to_sheet(rows);outWB=XLSX.utils.book_new();XLSX.utils.book_append_sheet(outWB,ows,'Data');info.textContent=`${rows.length-1} SKUs added | ${skipped} zero-qty skipped | Output: ${outName}`;document.getElementById('dlBtn').textContent='Download '+outName;res.style.display='block';drop.innerHTML='<h2>✅ Processed!</h2><p>Drop another file to replace</p>';};reader.readAsArrayBuffer(file);}function saveFile(){XLSX.writeFile(outWB,outName);}</script></body></html>
